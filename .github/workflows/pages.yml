# =============================================================================
# GitHub Pages deployment — Tension Mining
#
# Deploys docs/index.html and its assets (assets/, docs/zh-CN/, logo.svg,
# social-preview.jpg, etc.) to GitHub Pages via the official pages-action.
# =============================================================================

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - docs/**
      - assets/**
      - .github/workflows/pages.yml
  workflow_dispatch:

# Allow only one concurrent deployment; cancel in-progress runs for the same
# ref. Skip queued runs so new pushes supercede old ones.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare artifact directory
        run: |
          mkdir -p _site
          cp -r docs/* _site/
          cp -r assets _site/
          # Copy root-level assets needed by the site
          cp social-preview.jpg _site/ 2>/dev/null || true
          cp logo.svg _site/ 2>/dev/null || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4